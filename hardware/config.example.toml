# Example hardware service config — copy to config.toml and edit.

[general]
log_level = "INFO"

[server]
host = "0.0.0.0"
port = 8001

[roboclaw]
port = "/dev/ttyACM0"
baudrate = 38400
address = 128
timeout_s = 0.25
# "auto" tries a real serial port and falls back to a null/disconnected client
# when not present (useful for boot-on-laptop). Set to "serial" to require it.
connect_mode = "auto"

[telemetry]
update_rate_hz = 5

[mount]
az_counts_per_degree = 1000.0
alt_counts_per_degree = 1000.0
az_zero_count = 0
alt_zero_count = 0
goto_speed_qpps = 10000
goto_accel_qpps2 = 25000
goto_decel_qpps2 = 25000
max_slew_deg_per_command = 45.0

[observer]
name = "Radio Telescope"
latitude_deg = 51.5
longitude_deg = -0.1
altitude_m = 0.0
dish_diameter_m = 2.286
observing_freq_hz = 1.42e9

[camera]
enabled = true
device = 0
fps = 15
width = 1280
height = 720
label = "Cam A"

[sdr]
enabled = true
# SoapySDR driver for the spectrum chain:
#   "airspy" — Airspy Mini/R2 (gain is a 0-21 linearity index; bias tee via
#              airspy_gpio).
#   "rtlsdr" — RTL2832U dongles such as the Nooelec NESDR series (gain is
#              0-49.6 dB tuner gain; bias tee via rtl_biast). Cap
#              sample_rate_hz at ~2.4 Msps for reliable streaming.
driver = "airspy"
# Extra SoapySDR device args appended to the driver string, e.g.
# "serial=00000101" to pick a specific dongle. Empty = first device found.
device_args = ""
center_freq_hz = 1.4204e9
# Airspy Mini supports 3 Msps and 6 Msps only. 3 Msps (±1.5 MHz) covers
# the full galactic H I velocity spread with headroom. RTL-SDR tops out at
# ~2.4 Msps reliably (3.2 Msps absolute, lossy).
sample_rate_hz = 3.0e6
# Frequency resolution = sample_rate / fft_size. 8192 → 366 Hz bins, which
# resolves H I cloud velocity components (~5–50 km/s ≈ 24–240 kHz wide)
# across ~80+ bins instead of ~20. The FFT runs in a GNU Radio subprocess
# (NEON-optimised FFTW) so the choice is no longer bounded by NumPy on the Pi.
fft_size = 8192
# Fixed gain (driver-dependent scale: Airspy 0-21 linearity index; RTL-SDR
# 0-49.6 dB tuner gain). Leave unset to enable AGC, but AGC chases signal and
# ruins spectroscopy — fix it for the H I line. With a Sawbird H1+ (~40 dB
# pre-gain) feeding an Airspy Mini, 12-14 keeps the ADC below clipping while
# preserving SNR; on an RTL-SDR start around 25-35 dB.
gain_db = 14
# Set true if the Sawbird is powered through the SDR's bias tee (toggled via
# airspy_gpio for the Airspy, rtl_biast for RTL-SDR) rather than a separate
# 5 V injector. RTL-SDR bias-tee needs an NESDR SMArTee or similar.
lna_bias_tee_enabled = false
# Rolling integration window for the displayed trace, in wall-clock seconds.
# Per-bin σ ≈ 1/√(integration_seconds × bin_bandwidth). 15-30 s is a good
# starting point for the galactic-plane H I line with a Sawbird-class LNA;
# go higher for weaker sightlines, lower for snappier display response.
integration_seconds = 15.0
publish_rate_hz = 5.0

# ── Observation mode ──────────────────────────────────────────────────────
# "hydrogen_line" (default): the [sdr] spectrum chain above, fed by a
#   Sawbird+ H1 LNA.
# "goes": the [goes] satellite downlink chain below, fed by a Sawbird+ GOES
#   LNA. Swap the LNA, flip this switch, restart rt-hardware. The two chains
#   are fully segregated — only the selected one runs (one Airspy).
[observation]
mode = "hydrogen_line"

[goes]
# The GOES receive chain is goestools (https://github.com/pietern/goestools):
# rt-hardware supervises a goesrecv subprocess (SDR → demod → Viterbi →
# Reed-Solomon → VCDUs) and a goesproc subprocess (VCDUs → image/text files),
# generating the goesrecv config from the settings below.
#
# "hrit" for GOES-16 and later (927 kbaud); "lrit" for older birds.
mode = "hrit"
# goesrecv source: "airspy" or "rtlsdr".
sdr = "airspy"
downlink_freq_hz = 1.6941e9
sample_rate_hz = 3.0e6
# SDR gain, passed straight through to goesrecv.
gain_db = 18
# Set true if the Sawbird+ GOES is powered through the SDR's bias tee
# (goesrecv owns the SDR, so it also drives the bias tee).
lna_bias_tee_enabled = false
# goestools binaries — absolute paths or $PATH lookups.
goesrecv_bin = "goesrecv"
goesproc_bin = "goesproc"
# goesproc handler config (crops, false color, filename templates). Empty =
# auto-discover the goestools-installed config, falling back to the minimal
# handler set shipped with rt-hardware.
goesproc_config = ""
# Estimated SNR (dB) at which the UI reports "signal acquired".
snr_lock_db = 4.0
# goesproc's working directory — decoded products are indexed and served
# from here. Relative to RT_STATE_DIR when set.
products_dir = "goes_products"
max_products = 200
# Synthetic downlink for development/demos — no SDR or goestools needed.
# Status frames, demo products and the whole UI run unchanged; lock follows
# the dish pointing.
simulate = false
# Which catalog entry the connect panel targets by default.
target_satellite_id = "goes-east"

[[goes.satellites]]
id = "goes-east"
name = "GOES-East (GOES-19)"
longitude_deg = -75.2

[[goes.satellites]]
id = "goes-west"
name = "GOES-West (GOES-18)"
longitude_deg = -137.0
