# Example hardware service config — copy to config.toml and edit.

[general]
log_level = "INFO"

[server]
host = "0.0.0.0"
port = 8001

[roboclaw]
port = "/dev/ttyACM0"
baudrate = 38400
address = 128
timeout_s = 0.25
# "auto" tries a real serial port and falls back to a null/disconnected client
# when not present (useful for boot-on-laptop). Set to "serial" to require it.
connect_mode = "auto"

[telemetry]
update_rate_hz = 5

[mount]
az_counts_per_degree = 1000.0
alt_counts_per_degree = 1000.0
az_zero_count = 0
alt_zero_count = 0
goto_speed_qpps = 10000
goto_accel_qpps2 = 25000
goto_decel_qpps2 = 25000
max_slew_deg_per_command = 45.0

[observer]
name = "Radio Telescope"
latitude_deg = 51.5
longitude_deg = -0.1
altitude_m = 0.0
dish_diameter_m = 2.286
observing_freq_hz = 1.42e9

[camera]
enabled = true
device = 0
fps = 15
width = 1280
height = 720
label = "Cam A"

[sdr]
enabled = true
center_freq_hz = 1.4204e9
# Airspy Mini supports 3 Msps and 6 Msps only. 3 Msps (±1.5 MHz) covers
# the full galactic H I velocity spread with headroom.
sample_rate_hz = 3.0e6
# Frequency resolution = sample_rate / fft_size. 8192 → 366 Hz bins, which
# resolves H I cloud velocity components (~5–50 km/s ≈ 24–240 kHz wide)
# across ~80+ bins instead of ~20. The FFT runs in a GNU Radio subprocess
# (NEON-optimised FFTW) so the choice is no longer bounded by NumPy on the Pi.
fft_size = 8192
# Airspy "linearity" gain index (0-21, not dB). Leave unset to enable AGC,
# but AGC chases signal and ruins spectroscopy — fix it for the H I line.
# With a Sawbird H1+ (~40 dB pre-gain) feeding the Airspy Mini, 12-14 keeps
# the ADC well below clipping while preserving SNR on the line.
gain_db = 14
# Set true if the Sawbird is powered through the Airspy's bias tee rather
# than a separate 5 V injector.
lna_bias_tee_enabled = false
# Rolling integration window for the displayed trace, in wall-clock seconds.
# Per-bin σ ≈ 1/√(integration_seconds × bin_bandwidth). 15-30 s is a good
# starting point for the galactic-plane H I line with a Sawbird-class LNA;
# go higher for weaker sightlines, lower for snappier display response.
integration_seconds = 15.0
publish_rate_hz = 5.0

# ── Observation mode ──────────────────────────────────────────────────────
# "hydrogen_line" (default): the [sdr] spectrum chain above, fed by a
#   Sawbird+ H1 LNA.
# "goes": the [goes] satellite downlink chain below, fed by a Sawbird+ GOES
#   LNA. Swap the LNA, flip this switch, restart rt-hardware. The two chains
#   are fully segregated — only the selected one runs (one Airspy).
[observation]
mode = "hydrogen_line"

[goes]
# GOES-R HRIT downlink: 1694.1 MHz, 927 kbaud BPSK, rate-1/2 convolutional
# + RS(255,223) coding. For LRIT (older birds): symbol_rate_baud = 293883
# and diff_decode = true (NRZ-M).
downlink_freq_hz = 1.6941e9
sample_rate_hz = 3.0e6
symbol_rate_baud = 927000
rrc_rolloff = 0.5
diff_decode = false
# Airspy linearity gain index (0-21). Comment out for AGC.
gain_db = 14
# Set true if the Sawbird+ GOES is powered through the Airspy's bias tee.
lna_bias_tee_enabled = false
# Pure-Python RS(255,223) correction. Disable on a struggling Pi to count
# frames without correcting them.
rs_enabled = true
# SNR (dB) at which the UI reports "signal acquired".
snr_lock_db = 4.0
# Decoded products (imagery, bulletins) directory + retention cap.
products_dir = "goes_products"
max_products = 200
# Synthetic downlink for development/demos — no SDR needed. The decode chain
# and UI run unchanged; lock follows the dish pointing.
simulate = false
# Which catalog entry the connect panel targets by default.
target_satellite_id = "goes-east"

[[goes.satellites]]
id = "goes-east"
name = "GOES-East (GOES-19)"
longitude_deg = -75.2

[[goes.satellites]]
id = "goes-west"
name = "GOES-West (GOES-18)"
longitude_deg = -137.0
