# Minimal goesproc handler config used when no goestools-installed config is
# found (rt-hardware prefers /usr/[local/]share/goestools/goesproc*.conf).
# Output directories are relative to goesproc's working directory, which
# rt-hardware sets to the product store. See the goestools docs for the full
# handler reference (crops, remaps, false color, filename templates).

[[handler]]
type = "image"
origin = "goes16"
directory = "./images/goes16/{time:%Y-%m-%d}"

[[handler]]
type = "image"
origin = "goes17"
directory = "./images/goes17/{time:%Y-%m-%d}"

[[handler]]
type = "image"
origin = "goes18"
directory = "./images/goes18/{time:%Y-%m-%d}"

[[handler]]
type = "image"
origin = "goes19"
directory = "./images/goes19/{time:%Y-%m-%d}"

[[handler]]
type = "emwin"
directory = "./emwin/{time:%Y-%m-%d}"

[[handler]]
type = "text"
origin = "nws"
directory = "./text/{time:%Y-%m-%d}"
