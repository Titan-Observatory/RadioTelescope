services:
  hardware:
    build: ./hardware
    restart: unless-stopped
    # The RoboClaw USB serial device. Override or comment out for hosts
    # without the hardware plugged in (use docker-compose.dev.yml).
    devices:
      - /dev/ttyACM0:/dev/ttyACM0
    volumes:
      - ./hardware/config.toml:/app/config.toml:ro
      - hardware_state:/app/state
    networks:
      - internal
    # Not published on a host port — only the platform reaches it.

  platform:
    build: ./platform
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - HARDWARE_URL=http://hardware:8001
    volumes:
      - ./platform/config.toml:/app/config.toml:ro
      - ./platform/passwords.txt:/app/passwords.txt:ro
      - platform_state:/app/state
    depends_on:
      - hardware
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  hardware_state:
  platform_state:
