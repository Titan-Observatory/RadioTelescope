[general]
log_level = "INFO"

[roboclaw]
port = "/dev/ttyACM0"
baudrate = 57600
# Packet Serial address. BasicMicro's decimal 128 is 0x80 here; do not write 0x128.
address = 0x80
timeout_s = 1
connect_mode = "auto"

[telemetry]
update_rate_hz = 5

[mount]
# M1 is azimuth, M2 is altitude. Tune these after measuring encoder counts.
az_counts_per_degree = -2.7778  # negative inverts direction; ~250 pulses per 90°
alt_counts_per_degree = 400.0   # rough placeholder: 25000 counts ÷ ~60° usable range
az_zero_count = 0
alt_zero_count = 0
# goto_*_qpps values are the fallback used only if the controller cannot be
# read at startup. In normal operation, slew speed comes from the velocity-PID
# QPPS stored on the RoboClaw itself (set via BasicMicro Motion Studio).
# Accel/decel default to the speed value (≈1 s ramp) unless explicitly set.
goto_speed_qpps = 1000
goto_accel_qpps2 = 1000
goto_decel_qpps2 = 1000
pointing_limit_altaz = []

# Empirical calibration for the elevation axis. Each point is an observed
# (encoder count, dish altitude) pair measured with an inclinometer. With 2
# points we fit a line; 3+ points fit a quadratic that passes through all of
# them, which captures the nonlinear actuator-to-angle relationship without
# needing to model the linkage geometry analytically.
# Re-measure and update if you reposition the actuator or its pivots.
[[mount.altitude_calibration.points]]
counts = 0
alt_deg = 30.0

[[mount.altitude_calibration.points]]
counts = 8000
alt_deg = 45.0

[[mount.altitude_calibration.points]]
counts = 24750
alt_deg = 70.0

[observer]
name = "My Radio Telescope"
latitude_deg = 28.03          # set to actual observatory latitude
longitude_deg = -81.97         # set to actual observatory longitude
altitude_m = 58.0            # metres above sea level
dish_diameter_m = 2.286      # 90 inches
observing_freq_hz = 1.42e9   # hydrogen line (21 cm)
# beam_fwhm_deg = 7.0        # uncomment to override computed FWHM

[sdr]
enabled = true
# RTL-SDR centred on the neutral hydrogen line (21 cm).
center_freq_hz = 1.4204e9
sample_rate_hz = 2.4e6
fft_size = 2048
# gain_db = 40       # uncomment to set a fixed tuner gain; default = "auto"
integration_frames = 64    # rolling EMA window; bigger = smoother trace
publish_rate_hz = 5

[camera]
enabled = true
device = 0        # /dev/video0 (USB webcam index; increment if multiple cameras)
fps = 15
label = "Cam A"

[server]
host = "0.0.0.0"
port = 8000
cors_origins = ["*"]
allowed_clients = ["127.0.0.1", "::1", "10.0.27.1", "10.0.27.2", "10.0.207.217"]
# IPs of reverse proxies whose X-Forwarded-For / CF-Connecting-IP headers we trust.
# When the Pi sits behind a local nginx, this should typically be just loopback.
trusted_proxies = ["127.0.0.1", "::1"]

[queue]
enabled = true
max_session_seconds = 600   # 10 min hard cap on a control lease
idle_timeout_seconds = 60   # release the lease after 60 s of no commands
max_queue_size = 100
# Generate with: python -c "import secrets; print(secrets.token_urlsafe(32))"
cookie_secret = "CHANGE-ME-generate-with-secrets.token_urlsafe-32"
cookie_name = "rt_session"

[turnstile]
enabled = true
# Cloudflare Turnstile keys. Use the always-pass test key 1x00000000000000000000AA
# and test secret 1x0000000000000000000000000000000AA for local dev.
site_key = "1x00000000000000000000AA"
secret_key = "1x0000000000000000000000000000000AA"
