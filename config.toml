[general]
log_level = "INFO"

[roboclaw]
port = "/dev/ttyACM0"
baudrate = 38400
address = 0x80
timeout_s = 0.25
connect_mode = "auto"

[telemetry]
update_rate_hz = 5

[terminal]
enabled = true
# shell = "powershell.exe" # Windows
# shell = "/bin/bash"      # Linux/Raspberry Pi

[server]
host = "0.0.0.0"
port = 8000
cors_origins = ["*"]
