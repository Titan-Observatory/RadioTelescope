[general]
log_level = "INFO"

[roboclaw]
port = "/dev/ttyACM0"
baudrate = 38400
address = 0x80
timeout_s = 0.25
connect_mode = "auto"

[telemetry]
update_rate_hz = 5

[terminal]
enabled = true
# shell = "powershell.exe" # Windows
# shell = "/bin/bash"      # Linux/Raspberry Pi

[mount]
# M1 is azimuth, M2 is altitude. Tune these after measuring encoder counts.
az_counts_per_degree = 1000.0
alt_counts_per_degree = 1000.0
az_zero_count = 0
alt_zero_count = 0
goto_speed_qpps = 10000
goto_accel_qpps2 = 25000
goto_decel_qpps2 = 25000

[server]
host = "0.0.0.0"
port = 8000
cors_origins = ["*"]
allowed_clients = ["10.0.27.1", "10.0.27.2"]
