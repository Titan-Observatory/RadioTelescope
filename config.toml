[general]
log_level = "INFO"
update_rate_hz = 10

[i2c]
bus = 1
ina226_address = 0x40

[i2c.ina226]
shunt_resistor_ohms = 0.01
averaging_mode = 4
bus_voltage_conversion_time_us = 1100
shunt_voltage_conversion_time_us = 1100

[motors.elevation]
rpwm_pin = 5
lpwm_pin = 6
max_duty = 80
ramp_time_s = 3.0

[motors.azimuth]
rpwm_pin = 20
lpwm_pin = 21
max_duty = 60
ramp_time_s = 3.0

[safety]
overcurrent_threshold_a = 5.0
overcurrent_holdoff_s = 0.5
azimuth_min_deg = 0.0
azimuth_max_deg = 360.0
elevation_min_deg = 5.0
elevation_max_deg = 85.0

[sdr]
device_index = 0
center_freq_hz = 1420405000
sample_rate_hz = 2048000
gain = "auto"
fft_size = 1024
integration_count = 8

[server]
host = "0.0.0.0"
port = 8000
cors_origins = ["*"]

# Observer location — used to convert Az/El ↔ RA/Dec in the sky map.
# Update to your actual site coordinates.
[observer]
latitude   = 51.5       # degrees north (negative for south)
longitude  = -0.1       # degrees east  (negative for west)
elevation_m = 0.0       # metres above sea level

# Position feedback from potentiometers via MCP3008 ADC over SPI.
# Set type = "mcp3008" once the hardware is wired up.
# Min/max ADC values should be measured by rotating each axis to its physical limits
# and recording the raw ADC counts with type = "mock" (or a diagnostic script).
[position_sensor]
type        = "mock"    # "mock" | "mcp3008"
spi_device  = 0         # /dev/spidev0.*
spi_channel = 0         # CE0
baud        = 1350000

[position_sensor.azimuth]
adc_channel = 0
min_adc     = 0
max_adc     = 1023
min_deg     = 0.0
max_deg     = 360.0

[position_sensor.elevation]
adc_channel = 1
min_adc     = 0
max_adc     = 1023
min_deg     = 5.0
max_deg     = 85.0
